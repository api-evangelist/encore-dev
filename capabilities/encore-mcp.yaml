name: encore-mcp
description: |
  Encore's built-in Model Context Protocol server exposes a running Encore application to AI agents
  via SSE (encore mcp start) or stdio (encore mcp run). Agents can inspect services, middleware, auth
  handlers, databases, Pub/Sub topics and subscriptions, buckets, cron jobs, source files,
  documentation, and live request traces and metrics — and act on them.
provider: encore-dev
inputs:
- name: transport
  type: string
  enum: [sse, stdio]
- name: tool
  type: string
  description: Name of an MCP tool exposed by the Encore MCP server.
outputs:
- name: result
  type: object
operations:
- list_services
- list_endpoints
- list_databases
- list_pubsub_topics
- list_cron_jobs
- list_buckets
- search_docs
- get_app_metadata
- query_traces
- query_metrics
- read_source_file
